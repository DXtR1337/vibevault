<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle Topographic/Wave Pattern -->
  <path d="M0 50 Q 50 20, 100 50 T 200 50" fill="none" stroke="#888888" stroke-width="1" opacity="0.1"/>
  <path d="M0 100 Q 50 70, 100 100 T 200 100" fill="none" stroke="#888888" stroke-width="1" opacity="0.1"/>
  <path d="M0 150 Q 50 120, 100 150 T 200 150" fill="none" stroke="#888888" stroke-width="1" opacity="0.1"/>
  
  <path d="M50 0 Q 80 50, 50 100 T 50 200" fill="none" stroke="#888888" stroke-width="0.5" opacity="0.05"/>
  <path d="M150 0 Q 180 50, 150 100 T 150 200" fill="none" stroke="#888888" stroke-width="0.5" opacity="0.05"/>
  
  <circle cx="100" cy="100" r="2" fill="#888888" opacity="0.1"/>
  <circle cx="20" cy="20" r="1" fill="#888888" opacity="0.1"/>
  <circle cx="180" cy="180" r="1" fill="#888888" opacity="0.1"/>
</svg>
