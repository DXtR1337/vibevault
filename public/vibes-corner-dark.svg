<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#C5A028" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#996515" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <g filter="url(#glow)" stroke="url(#gold-gradient)" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Abstract Flowing Waves creating a corner motif -->
    <path d="M400 50 C 300 50, 50 100, 50 400" opacity="0.4"/>
    <path d="M400 100 C 250 100, 100 200, 100 400" opacity="0.6"/>
    <path d="M400 150 C 200 150, 150 250, 150 400" opacity="0.8"/>
    <path d="M400 200 C 250 200, 200 300, 200 400" opacity="0.5"/>
    <path d="M400 0   C 280 0,   0   120, 0   400" opacity="0.3" stroke-width="3"/>
    
    <!-- Inner curls -->
    <path d="M400 80 C 320 80, 120 180, 120 400" opacity="0.5"/>
    <path d="M400 180 C 280 180, 180 320, 180 400" opacity="0.7"/>
    
     <!-- Decorative accent dots -->
    <circle cx="100" cy="350" r="2" fill="#D4AF37" stroke="none" opacity="0.6"/>
    <circle cx="150" cy="280" r="3" fill="#D4AF37" stroke="none" opacity="0.8"/>
    <circle cx="280" cy="150" r="2" fill="#D4AF37" stroke="none" opacity="0.6"/>
    <circle cx="350" cy="100" r="1.5" fill="#D4AF37" stroke="none" opacity="0.5"/>
  </g>
</svg>
